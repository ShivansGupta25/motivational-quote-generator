<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Animated background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <div class="card" id="first">
            <span class="card-label"> ✦ Daily Inspiration</span>
            <h1>"Honesty is the best policy"</h1>
            <p class="author">— Benjamin Franklin</p>
            <button>Generate Quote ✨</button>
        </div>
        <p class="footer-text">Click the button for a spark of wisdom</p>
    </div>

    <script src="sript.js"></script>
</body>

</html>
